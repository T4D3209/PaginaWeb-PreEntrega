<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Contacto</title>
</head>
<body>
    <header>
        <nav class="barra-nav">
            <div class="div-logo"><a class="logo" href="/pages/index.html">NovaStore</a>
            </div>
            <div>
                <ul class="lista-nav">
                    <li><a href="/pages/index.html" class="line-pointer">Inicio</a></li>
                    <li><a href="/pages/contacto.html" class="line-pointer">Contacto</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <div class="div-contacto">
            <form class="form-contacto" method="POST" action="https://formspree.io/f/mbdwovvp">
                <h2>Contactanos</h2>
                <div class="form-group">
                    <label for="nombre">Nombre y Apellido</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Martin Fernandez" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Dejanos tu mensaje" required></textarea>
                </div>
                <button class="boton-enviar" type="submit">Enviar</button>
            </form>
        </div>
    </main>
    
    <footer>
        <div class="nav-footer">
            <nav>
                <ul class="footer-list">
                    <li><a href="https://wa.me/1234567890"><img src="../assets/images/whatsapp.png" alt="logo-whatsapp"></a></li>
                    <li><a href="https://www.instagram.com"><img src="../assets/images/instagram.png" alt="logo-instagram"></a></li>
                    <li><a href="https://www.facebook.com"><img src="../assets/images/facebook.png" alt="logo-facebook"></a></li>
                </ul>
            </nav>
        </div>
        <p>Todos los derechos reservados a Tadeo Céspedes</p>
    </footer>
</body>
</html>
